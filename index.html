let BLANK_RATES = []; // { appCode, supplier, sizes: { S, M, L, XL, "2XL", "3XL" } }

function parseBlankRates(csv) {
  const lines = csv.trim().split("\n").slice(1);
  return lines.map(line => {
    const cols = line.split(",").map(c => c.trim());
    const appCode = cols[0];
    const supplier = cols[1];
    const sizes = { S: parseFloat(cols[2])||0, M: parseFloat(cols[3])||0, L: parseFloat(cols[4])||0, XL: parseFloat(cols[5])||0, "2XL": parseFloat(cols[6])||0, "3XL": parseFloat(cols[7])||0 };
    return { appCode, supplier, sizes };
  }).filter(r => r.appCode && r.supplier);
}

function getBlankSuppliers() {
  const s = new Set(BLANK_RATES.map(r => r.supplier));
  return [...s];
}

function getBlankRate(appCode, supplier, size) {
  const row = BLANK_RATES.find(r => r.appCode === appCode && r.supplier === supplier);
  return row ? (row.sizes[size] || 0) : 0;
}

// Returns the cheapest supplier for a given appCode + size quantity map
// sizesMap: { S: qty, M: qty, ... }
function getCheapestSupplier(appCode, sizesMap) {
  const suppliers = getBlankSuppliers();
  if (!suppliers.length) return null;
  let best = null;
  let bestCost = Infinity;
  suppliers.forEach(supplier => {
    const total = Object.entries(sizesMap).reduce((sum, [sz, qty]) => {
      return sum + getBlankRate(appCode, supplier, sz) * (parseInt(qty) || 0);
    }, 0);
    // Only consider suppliers that have pricing for this appCode (total > 0)
    if (total > 0 && total < bestCost) {
      bestCost = total;
      best = supplier;
    }
  });
  return best || suppliers[0];
}

function parseCSVRates(csv) {
  const lines = csv.trim().split("\n").slice(1);
  return lines.map(line => {
    const cols = line.split(",").map(c => c.trim());
    const min = parseInt(cols[0]);
    const max = parseInt(cols[1]);
    const rates = [cols[2],cols[3],cols[4],cols[5],cols[6],cols[7]].map(v =>
      v === "" || v === undefined ? null : parseFloat(v)
    );
    return { min, max, rates };
  }).filter(r => !isNaN(r.min) && !isNaN(r.max));
}

function getRate(totalQty, colors) {

  const b = PRINT_RATES.find(r => totalQty >= r.min && totalQty <= r.max);

            : <span style={{ color:"#e05050", fontSize:"14px" }}>⚠ No standard rate for {groupQty} qty + {effectiveColors} colors — quote required</span>}
        </div>

}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useState([blankItem()]);
  const [breakdown, setBreakdown] = useState(null);
  const [ratesStatus, setRatesStatus] = useState("loading"); // loading | live | fallback

  React.useEffect(() => {
    fetch(SHEET_CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const parsed = parseCSVRates(csv);
        if (parsed.length > 0) { PRINT_RATES = parsed; setRatesStatus("live"); }
        else { setRatesStatus("fallback"); }
      })
      .catch(() => setRatesStatus("fallback"));

    fetch(BLANK_RATES_URL)
      .then(r => r.text())
      .then(csv => { BLANK_RATES = parseBlankRates(csv); });
  }, []);

  const updateItem = useCallback((id,u)=>setItems(p=>p.map(it=>it.id===id?u:it)),[]);
  const removeItem = useCallback((id)=>setItems(p=>p.filter(it=>it.id!==id)),[]);
  const addItem = ()=>setItems(p=>[...p,blankItem()]);

  const getItemEffectiveQty = (item) => {
    const sizes = item.sizes || {};
    const fromSizes = Object.values(sizes).reduce((s,v)=>s+(parseInt(v)||0),0);
    return fromSizes > 0 ? fromSizes : (parseInt(item.qty)||0);
  };

  const totalQty = items.reduce((s,it)=>s+getItemEffectiveQty(it),0);

  // Build per-ink-color group quantities for bracket pricing
  // Items sharing the same styleCode AND ink color pool their qty.
  // Same ink color on a different style does NOT qualify — different style = different run.
  const getInkKey = (item) => {
    const cws = item.styleCode ? (COLORWAYS[item.styleCode]||[]) : [];
    const cw = cws[parseInt(item.colorwayIndex)];
    const inkPart = cw ? cw.inkColor.toLowerCase().trim() : `__uid_${item.id}__`;
    return item.styleCode ? `${item.styleCode}::${inkPart}` : `__uid_${item.id}__`;
  };

  const inkGroupQty = {};
  items.forEach(item => {
    const qty = getItemEffectiveQty(item);
    if (!qty) return;
    const key = getInkKey(item);
    inkGroupQty[key] = (inkGroupQty[key]||0) + qty;
  });

  const bracketTextForQty = (qty) => {
    if (!qty) return "";
    if (qty<12)  return "Under minimum (12) — use DTF";
    if (qty<36)  return "Bracket: 12–35 pcs";
    if (qty<72)  return "Bracket: 36–71 pcs";
    if (qty<145) return "Bracket: 72–144 pcs · screens waived";
    if (qty<501) return "Bracket: 145–500 pcs · screens waived";
    if (qty<1001)return "Bracket: 501–1,000 pcs";
    return "1,001+ pcs — quote required";
  };

  const bracketText = () => bracketTextForQty(totalQty);

  const exportBlankPO = () => {
    const today = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
    const poNum = "PO-" + Date.now().toString().slice(-6);

    // Build line items grouped by appCode + garmentColor
    const lineMap = {};
    items.forEach(item => {
      const cat = RAW_CATALOG.find(c => c.styleCode === item.styleCode);
      if (!cat) return;
      const cws = COLORWAYS[item.styleCode] || [];
      const cw = cws[parseInt(item.colorwayIndex)];
      if (!cw) return;
      const sizeMap = item.sizes || {};
      const activeSizes = Object.entries(sizeMap).filter(([,v]) => (parseInt(v)||0) > 0);
      if (!activeSizes.length) return;
      const key = `${cat.appCode}::${cw.garmentColor}`;
      if (!lineMap[key]) lineMap[key] = { appCode: cat.appCode, styleName: cat.styleName, garmentColor: cw.garmentColor, sizes: {} };
      activeSizes.forEach(([sz, v]) => {
        lineMap[key].sizes[sz] = (lineMap[key].sizes[sz] || 0) + (parseInt(v)||0);
      });
    });

    // Auto-assign cheapest supplier per line after sizes are fully accumulated
    Object.values(lineMap).forEach(line => {
      line.supplier = getCheapestSupplier(line.appCode, line.sizes) || "—";
    });

    const lines = Object.values(lineMap);
    if (!lines.length) { alert("No items with sizes selected."); return; }

    // Build print cost lookup per appCode
    const printCostMap = {};
    if (breakdown) {
      breakdown.lines.forEach(line => {
        const item = items.find(it => {
          const cat = RAW_CATALOG.find(c => c.styleCode === it.styleCode);
          const cws = COLORWAYS[it.styleCode]||[];
          const cw = cws[parseInt(it.colorwayIndex)];
          const lbl = cat ? `${cat.styleName}${cw ? ` — ${cw.garmentColor} / ${cw.inkColor}` : ""}` : "";
          return lbl === line.label;
        });
        if (item) {
          const cat = RAW_CATALOG.find(c => c.styleCode === item.styleCode);
          if (cat) printCostMap[cat.appCode] = (printCostMap[cat.appCode] || 0) + line.cpp;
        }

    let grandBlank = 0;

    const rowsHtml = lines.map(line => {

      const blankTotal = activeSizes.reduce((s,sz) => s + getBlankRate(line.appCode, line.supplier, sz) * (line.sizes[sz]||0), 0);
      const printCpp = printCostMap[line.appCode] || 0;

      grandBlank += blankTotal;

      const sizeCells = sizeOrder.map(sz => `<td style="padding:6px 8px;text-align:center;font-size:13px;border:1px solid #e0d8c8">${(line.sizes[sz]||0) > 0 ? line.sizes[sz] : "—"}</td>`).join("");

      return `<tr>

        ${sizeCells}
        <td style="padding:6px 8px;text-align:center;font-size:13px;border:1px solid #e0d8c8;font-weight:bold">${qty}</td>
        <td style="padding:6px 8px;text-align:right;font-size:13px;border:1px solid #e0d8c8">$${blankCpp.toFixed(2)}</td>

        <td style="padding:6px 8px;text-align:right;font-size:13px;border:1px solid #e0d8c8">$${printCpp.toFixed(2)}</td>
        <td style="padding:6px 8px;text-align:right;font-size:13px;border:1px solid #e0d8c8">$${printTotal.toFixed(2)}</td>
        <td style="padding:6px 8px;text-align:right;font-size:13px;border:1px solid #e0d8c8;font-weight:bold;color:#8a6030">$${landedCpp.toFixed(2)}</td>
        <td style="padding:6px 8px;text-align:right;font-size:13px;border:1px solid #e0d8c8;font-weight:bold;color:#8a6030">$${landedTotal.toFixed(2)}</td>
      </tr>`;
    }).join("");

    const html = `<!DOCTYPE html>

        <div style="font-size:12px;color:#aaa;margin-top:4px">PO # ${poNum} · ${today}</div>
      </td>
    </tr>
  </table>

  <div style="height:2px;background:linear-gradient(90deg,#8a6030,#d4c4a0,transparent);margin-bottom:20px"></div>

  <table style="margin-bottom:8px;background:#faf7f0;border:1px solid #d4c4a0;border-radius:6px">

  <table style="margin-bottom:24px;border:1px solid #d4c4a0;font-size:13px">

    const a = document.createElement("a");
    a.href = url;
    a.download = `BlankPO-${poNum}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  };

  const calculate = () => {
    const charged = new Set();
    let grand = 0;
    const lines = [];

    items.forEach(item=>{
      const sizeMap = item.sizes || {};
      const activeSizeEntries = Object.entries(sizeMap).filter(([,v])=>(parseInt(v)||0)>0);
      const selectedSizes = activeSizeEntries.map(([k])=>k);
      const numSizes = selectedSizes.length;
      const qtyFromSizes = activeSizeEntries.reduce((s,[,v])=>s+(parseInt(v)||0),0);
      const qty = qtyFromSizes > 0 ? qtyFromSizes : (parseInt(item.qty)||0);
      const qtyPerSize = numSizes > 0 ? Math.round(qty / numSizes) : qty;
      if (!qty) return;
      const cat = RAW_CATALOG.find(c=>c.styleCode===item.styleCode);
      const cws = item.styleCode?(COLORWAYS[item.styleCode]||[]):[];
      const cw  = cws[parseInt(item.colorwayIndex)];
      const isPocket = cat && cat.appCode==="6030";
      const gType = cat ? cat.garmentType : "Standard";
      const effectiveColors = item.colors+(item.whiteUnderbase?1:0);
      // Use ink-group qty for bracket pricing, not blind total
      const inkKey = getInkKey(item);
      const groupQty = inkGroupQty[inkKey] || qty;
      const rate = getRate(groupQty, effectiveColors);
      const label = cat
        ? `${cat.styleName}${cw?` — ${cw.garmentColor} / ${cw.inkColor}`:""}`
        : `Item #${item.id}`;

      // SKU: Style-AppCode-GarmentColor-InkColor-Size (one per selected size, or base if none)
      const skuBase = [
        item.styleCode || "???",
        cat ? cat.appCode : "???",
        cw ? cw.garmentColor.replace(/\s+/g,"-") : "???",
        cw ? cw.inkColor.replace(/\s+/g,"-")    : "???",
      ].join("-");
      const skus = activeSizeEntries.length > 0
        ? activeSizeEntries.map(([sz, v]) => ({ sku:`${skuBase}-${sz}`, qty:parseInt(v)||0 }))
        : [{ sku:skuBase, qty }];

      const rows = [];
      let sub = 0;

      // Print
      if (rate!==null) {
        const locs = item.printLocations || 1;
        const c=rate*qty*locs; sub+=c;
        rows.push({ d:`Print (${effectiveColors} color${effectiveColors>1?"s":""} × ${qty} @ $${rate.toFixed(2)}${locs===2?" × 2 locations":""}, group qty ${groupQty})`, a:c });
      } else {
        rows.push({ d:`⚠ Print: QUOTE REQUIRED (${effectiveColors} colors, ${groupQty} group qty)`, a:0, warn:true });
      }

      // Oversize
      if (item.locationType==="Oversized") {
        const c=OVERSIZE_SURCHARGE*qty; sub+=c;
        rows.push({ d:`Oversize surcharge (${qty} × $${OVERSIZE_SURCHARGE})`, a:c });
      }

      // Sleeve/pocket
      if (item.locationType==="Sleeve/Pocket" || isPocket) {
        const c=SLEEVE_SURCHARGE*qty; sub+=c;
        rows.push({ d:`Sleeve/pocket surcharge (${qty} × $${SLEEVE_SURCHARGE})`, a:c });
      }

      // Garment type
      if (gType==="Fleece") {
        const c=FLEECE_SURCHARGE*qty; sub+=c;
        rows.push({ d:`Fleece print surcharge (${qty} × $${FLEECE_SURCHARGE})`, a:c });
      }
      if (gType==="Polyester") {
        const c=POLY_SURCHARGE*qty; sub+=c;
        rows.push({ d:`Polyester surcharge (${qty} × $${POLY_SURCHARGE})`, a:c });
      }

      // Flash
      if (item.flash) {
        const c=FLASH*qty; sub+=c;
        rows.push({ d:`Flash (${qty} × $${FLASH})`, a:c });
      }

      // Staging
      if (item.staging) {
        const c=STAGING*qty; sub+=c;
        rows.push({ d:`Staging (${qty} × $${STAGING})`, a:c });
      }

      // Specialty ink
      if (item.specialtyInk>0) {
        const c=item.specialtyInk*qty; sub+=c;
        rows.push({ d:`Specialty ink (${qty} × $${item.specialtyInk.toFixed(2)})`, a:c });
      }

      // Ink color changes
      if (item.inkColorChanges>0) {
        const c=item.inkColorChanges*INK_CHANGE; sub+=c;
        rows.push({ d:`Ink color changes (${item.inkColorChanges} × $${INK_CHANGE})`, a:c });
      }

      // Screen charges
      if (!item.isReprint && groupQty<72) {
        const sc = item.locationType==="Oversized" ? SCREEN_OVERSIZE : SCREEN_NEW;
        let newScreens=0; const names=[];

        if (!charged.has(inkKey)) { charged.add(inkKey); newScreens++; names.push(cw?cw.inkColor:"(unnamed ink)"); }

        for (let i=1;i<item.colors;i++) { newScreens++; names.push(`Extra color ${i}`); }

        if (item.whiteUnderbase && !charged.has("__underbase__")) {
          charged.add("__underbase__"); newScreens++; names.push("White underbase");
        }

        if (newScreens>0) {
          const c=newScreens*sc; sub+=c;
          rows.push({ d:`Screen charges (${newScreens} × $${sc}: ${names.join(", ")})`, a:c });
        } else {
          rows.push({ d:`Screen charges: $0 — ink color shared with prior item`, a:0, info:true });
        }
      } else if (item.isReprint) {
        rows.push({ d:`Screen charges: $0 — reprint, screens on file`, a:0, info:true });
      } else {
        rows.push({ d:`Screen charges: $0 — waived at 72+ pcs (group qty ${groupQty})`, a:0, info:true });
      }

      grand += sub;
      lines.push({ label, qty, numSizes, groupQty, sub, rows, cpp: qty>0 ? sub/qty : 0, sizes: selectedSizes, skus });
    });

    setBreakdown({ lines, grand, totalQty, avgCpp: totalQty>0 ? grand/totalQty : 0, inkGroupQty });
  };

  return (
    <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 20% 20%,#1a1005,#0a0704 60%,#000)", fontFamily:"Georgia,serif", color:"#e8d5a0", padding:"30px 20px" }}>
      <style>{`*{box-sizing:border-box}input:focus,select:focus{outline:1px solid #c0a060}::placeholder{color:#5a4a30}input[type=number]::-webkit-inner-spin-button{opacity:.6;transform:scale(1.3);transform-origin:right center}select option{background:#1a1208}`}</style>

      {/* Header */}
      <div style={{ maxWidth:960, margin:"0 auto 28px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:20, marginBottom:10 }}>
          <img src={BWA_LOGO} style={{ height:44, filter:"brightness(0) invert(1) sepia(1) saturate(0.5) hue-rotate(0deg)", opacity:0.85 }} alt="Best West Apparel" />
          <div>
            <h1 style={{ margin:0, fontSize:24, color:"#e8c87a", letterSpacing:"0.02em" }}>Lost Art Design + Print</h1>
            <span style={{ color:"#6a5a3a", fontSize:11, letterSpacing:"0.15em", textTransform:"uppercase" }}>Contract Screen Print Pricing Calculator</span>
          </div>
        </div>
        <div style={{ height:1, background:"linear-gradient(90deg,#8a6a30,transparent)" }} />
        <p style={{ color:"#6a5a3a", fontSize:12, marginTop:8 }}>
          Best West Apparel catalog preloaded · Garments priced separately · Screen print only
          {" · "}
          {ratesStatus === "loading" && <span style={{ color:"#8a8a40" }}>⏳ Loading live rates...</span>}
          {ratesStatus === "live"    && <span style={{ color:"#6a9a50" }}>✓ Live rates loaded</span>}
          {ratesStatus === "fallback"&& <span style={{ color:"#c07050" }}>⚠ Using fallback rates — check sheet</span>}
        </p>
      </div>

      <div style={{ maxWidth:960, margin:"0 auto" }}>

        {/* Qty banner */}
        <div style={{ background:"#1a1208", border:"1px solid #5a4a20", borderRadius:6, padding:"10px 16px", marginBottom:20 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", marginBottom: Object.keys(inkGroupQty).length > 1 ? 8 : 0 }}>
            <span style={{ color:"#8a7a5a", fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em" }}>Total Qty:</span>
            <span style={{ color:"#e8c87a", fontSize:22, fontWeight:"bold" }}>{totalQty}</span>
            {totalQty>0 && <span style={{ color:"#7a6a4a", fontSize:12 }}>{bracketText()}</span>}
          </div>
          {Object.keys(inkGroupQty).length > 1 && (
            <div style={{ borderTop:"1px solid #3a2c18", paddingTop:8 }}>
              <span style={{ color:"#6a5a3a", fontSize:11, textTransform:"uppercase", letterSpacing:"0.08em" }}>Ink Groups (bracket pricing per group): </span>
              {Object.entries(inkGroupQty).map(([k,v],i)=>{
                const parts = k.split("::");
                const dispStyle = parts[0] || k;
                const dispInk = parts[1] ? parts[1].replace(/\b\w/g,c=>c.toUpperCase()) : "";
                return (
                  <span key={i} style={{ display:"inline-block", marginLeft:8, color:"#c0a060", fontSize:12, background:"#2a1e08", border:"1px solid #4a3820", borderRadius:4, padding:"1px 8px" }}>
                    {dispStyle} / {dispInk}: <strong>{v} pcs</strong> — {bracketTextForQty(v)}
                  </span>
                );
              })}
            </div>
          )}
        </div>

        {/* Items */}
        {items.map((it,i)=>(
          <ItemRow key={it.id} item={it} index={i} groupQty={inkGroupQty[getInkKey(it)]||parseInt(it.qty)||0}
            onChange={u=>updateItem(it.id,u)} onRemove={()=>removeItem(it.id)}
            onClear={()=>updateItem(it.id,{...blankItem(), id:it.id})} />
        ))}

        {/* Add */}
        <button onClick={addItem} style={{ width:"100%", padding:12, marginBottom:20, background:"none", border:"1px dashed #4a3820", borderRadius:8, color:"#8a7a5a", fontSize:13, cursor:"pointer", letterSpacing:"0.08em" }}
          onMouseEnter={e=>{e.target.style.borderColor="#c0a060";e.target.style.color="#c0a060"}}
          onMouseLeave={e=>{e.target.style.borderColor="#4a3820";e.target.style.color="#8a7a5a"}}>
          + Add Another Style / Colorway
        </button>

        {/* Calculate + Export row */}
        <div style={{ display:"flex", gap:12, marginBottom:30 }}>
          <button onClick={calculate} style={{ flex:2, padding:14, background:"linear-gradient(135deg,#8a6010,#c0a040)", border:"none", borderRadius:8, color:"#0a0704", fontSize:15, fontWeight:"bold", letterSpacing:"0.15em", textTransform:"uppercase", cursor:"pointer" }}>
            Calculate Total
          </button>
          <button onClick={exportBlankPO} style={{ flex:1, padding:14, background:"linear-gradient(135deg,#1a3a20,#2a6030)", border:"1px solid #4a8a50", borderRadius:8, color:"#a0e0a0", fontSize:13, fontWeight:"bold", letterSpacing:"0.1em", textTransform:"uppercase", cursor:"pointer" }}>
            ⬇ Export Blank PO
          </button>
        </div>

        {/* Breakdown */}
        {breakdown && (
          <div style={{ background:"linear-gradient(135deg,#1a1208,#110d06)", border:"1px solid #6a5020", borderRadius:10, padding:24, marginBottom:30 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, paddingBottom:12, borderBottom:"1px solid #4a3820" }}>
              <h2 style={{ margin:0, color:"#e8c87a", fontSize:20 }}>Cost Breakdown</h2>
              <button
                onClick={()=>exportPDF(breakdown, items)}
                style={{ background:"linear-gradient(135deg,#2a3a20,#3a5020)", border:"1px solid #6a8a40", borderRadius:6, color:"#a0c870", fontSize:12, padding:"8px 18px", cursor:"pointer", letterSpacing:"0.08em", display:"flex", alignItems:"center", gap:6 }}>
                ⬇ Export PDF / Print Quote
              </button>
            </div>

            {breakdown.lines.map((line,i)=>(
              <div key={i} style={{ marginBottom:20, paddingBottom:16, borderBottom: i<breakdown.lines.length-1?"1px solid #2a2010":"none" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <span style={{ color:"#e8c87a", fontSize:14, fontWeight:"bold" }}>{line.label}</span>
                    <span style={{ color:"#6a5a3a", fontSize:12, marginLeft:8 }}>({line.qty} pcs)</span>
                    {line.sizes && line.sizes.length > 0 && (
                      <span style={{ color:"#7a6a4a", fontSize:11, marginLeft:8, background:"#2a2010", padding:"1px 7px", borderRadius:10, border:"1px solid #4a3820" }}>
                        {line.sizes.join(" · ")}
                      </span>
                    )}
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ color:"#e8c87a", fontSize:15, fontWeight:"bold", marginBottom:4 }}>${line.sub.toFixed(2)}</div>
                    <CostBadge amount={line.cpp} label="/ shirt" />
                  </div>
                </div>
                {/* SKUs — stacked with per-size qty */}
                {line.skus && line.skus[0]?.sku !== "???-???-???-???" && line.skus[0]?.sku && (
                  <div style={{ marginBottom:8, paddingLeft:12, display:"flex", flexDirection:"column", gap:3 }}>
                    {line.skus.map((entry,k)=>(
                      <div key={k} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#110d06", border:"1px solid #2a2010", borderRadius:3, padding:"3px 10px" }}>
                        <span style={{ fontFamily:"monospace", fontSize:11, color:"#a08040", letterSpacing:"0.04em" }}>{entry.sku}</span>
                        <span style={{ fontFamily:"monospace", fontSize:12, color:"#c0a060", fontWeight:"bold", marginLeft:16 }}>{entry.qty} pcs</span>
                      </div>
                    ))}
                  </div>
                )}
                {line.rows.map((r,j)=>(
                  <div key={j} style={{ display:"flex", justifyContent:"space-between", padding:"2px 12px", color:r.warn?"#e07050":r.info?"#6a8a5a":"#9a8a6a", fontSize:12 }}>
                    <span>{r.d}</span>
                    {r.a>0 && <span>${r.a.toFixed(2)}</span>}
                  </div>
                ))}
              </div>
            ))}

            {/* Grand total */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:16, borderTop:"1px solid #6a5020" }}>
              <div>
                <div style={{ color:"#8a7a5a", textTransform:"uppercase", letterSpacing:"0.12em", fontSize:12 }}>Total Print Charges</div>
                <div style={{ color:"#5a5040", fontSize:11, marginTop:2 }}>garments not included</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ color:"#e8c87a", fontSize:32, fontWeight:"bold", marginBottom:6 }}>${breakdown.grand.toFixed(2)}</div>
                <CostBadge amount={breakdown.avgCpp} label="avg / shirt" />
              </div>
            </div>
          </div>
        )}

        {/* Footer notes */}
        <div style={{ background:"#0e0a04", border:"1px solid #2a2010", borderRadius:6, padding:16, fontSize:11, color:"#5a5040", lineHeight:1.7 }}>
          <strong style={{ color:"#6a5a3a" }}>Notes:</strong> Prices per print location. Garments priced separately.
          Hoodies auto-flagged as fleece (+$0.35/pc). Pocket tees auto-flagged for sleeve surcharge (+$1.00/pc).
          Shared ink colors across styles are de-duplicated for screen charges.
          Screens waived at 72+ combined pcs. Contact Lost Art for shipping, embroidery, CMYK, and jacket pricing.
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
